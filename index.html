<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTech - Inicio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>

    <style>
        /* --- RESETEO ABSOLUTO PARA EVITAR INTERFERENCIAS --- */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow-x: hidden !important;
            font-family: 'Poppins', sans-serif;
        }

        /* CONTENEDOR PADRE PRINCIPAL - CONEXIÓN CON TU CARPETA IMG */
        .pantalla-principal {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url('img/fondo.png') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
        }

        /* CAPA PROTECTORA: Degradado sutil para leer el texto sin tapar al médico */
        .pantalla-principal::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.85) 30%, rgba(255, 255, 255, 0.2) 70%, rgba(255, 255, 255, 0) 100%) !important;
            z-index: 1;
        }

        /* --- MENÚ DE NAVEGACIÓN --- */
        #menu-navegacion {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            /* SE AJUSTÓ EL PADDING: Menos espacio arriba/abajo (5px) para equilibrar el logo grande */
            padding: 5px 80px; 
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            gap: 20px;
        }

        .logo-contenedor-hero {
            display: flex;
            align-items: center;
            gap: 12px; /* Espacio entre el icono y el texto "HealthTech" */
            margin-right: auto;
        }

        /* ESTILO CORREGIDO PARA QUE EL LOGO SEA MUCHO MÁS GRANDE */
        .logo-img {
            height: 90px; /* SE DUPLICÓ EL TAMAÑO (de 45px a 90px) */
            width: auto;
            object-fit: contain;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #1e5548;
        }

        #menu-navegacion .boton-perfil {
            background: none !important;
            border: none !important;
            color: #1e5548 !important;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.3s;
        }

        #menu-navegacion .boton-perfil:hover {
            color: #11332b !important;
            text-decoration: underline;
        }

        /* --- TEXTOS AJUSTADOS HACIA LA IZQUIERDA --- */
        .contenido-hero {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            text-align: left;
            padding-left: 10%;
            max-width: 50%;
        }

        .contenido-hero h1 {
            font-size: 48px;
            color: #1e5548;
            line-height: 1.3;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .btn-inicia-ya {
            background-color: #1e5548 !important;
            color: #ffffff !important;
            padding: 18px 60px;
            border: none !important;
            font-weight: 600;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(30, 85, 72, 0.35);
            transition: all 0.3s ease;
        }

        .btn-inicia-ya:hover {
            background-color: #11332b !important;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(17, 51, 43, 0.45);
        }

        /* --- CONFIGURACIÓN PARA MÓVILES (RESPONSIVO) --- */
        @media (max-width: 992px) {
            .pantalla-principal::before {
                background: rgba(255, 255, 255, 0.85) !important;
            }
            .contenido-hero {
                align-items: center;
                text-align: center;
                max-width: 100%;
                padding-left: 20px;
                padding-right: 20px;
            }
            #menu-navegacion {
                flex-direction: column;
                padding: 20px;
            }
            .logo-contenedor-hero {
                margin-right: 0;
                margin-bottom: 15px;
            }
            .contenido-hero h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="pantalla-principal">

        <nav id="menu-navegacion">
            <div class="logo-contenedor-hero">
                <img src="img/HEALTH(1).png" alt="Icono HealthTech" class="logo-img">
                <span class="logo-text">HealthTech</span>
            </div>
            <button type="button" class="boton-perfil" data-target="inicio.html">Inicio</button>
            <button type="button" class="boton-perfil" data-target="sectorclinico.html">Sector Clínico</button>
            <button type="button" class="boton-perfil" data-target="sectortecnico.html">Sector Técnico</button>
            <button type="button" class="boton-perfil" data-target="contacto.html">Contacto</button>
        </nav>

        <main class="contenido-hero">
            <h1>Donde la Medicina y la <br>Técnica se Encuentran</h1>
            <button type="button" class="btn-inicia-ya btn-seccion" data-target="inicio.html">INICIA YA</button>
        </main>

    </div>

</body>
</html>
